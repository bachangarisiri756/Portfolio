<!DOCTYPE html>
<html>
<head>
<title>My Restaurant</title>

<style>
#header{
    background-image: url("https://images.pexels.com/photos/262047/pexels-photo-262047.jpeg?cs=srgb&dl=pexels-pixabay-262047.jpg&fm=jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 0px;
    padding: 0px;
}

.overlay{
    background-color: rgba(255,255,255,0.6);
    color: blue;
    padding: 20px;
    margin: 0px;
    text-align: center;
}

.section{
    background-color: white;
    padding: 20px;
    margin-bottom: 35px;
    border-radius: 6px;
}

.content{
    overflow: auto;
    border: 2px violet solid; 
    margin: 10px;
    padding: 10px;
}

.left{
    float: left;
    width: 30%;
}

.right{
    float: right;
    width: 30%;
}

p.box{
    margin-right: 0px;
    padding-right: 0px;
}
</style>

</head>

<body>

<div id="header">
    <div class="overlay">
        <h1>Tasty Bites Restaurant</h1>
        <p>Enjoy our delicious meals</p>
    </div>
</div>

<div class="section">

<h2 style="text-align:center;"><u>Menu</u></h2>

<div class="content">

    <div class="left">
        <img src="https://images.pexels.com/photos/9609844/pexels-photo-9609844.jpeg" 
        alt="Chicken Biryani" style="width:80px;height:80px;">
    </div>

    <div class="left">
        <p style="text-align:center;">
        Chicken Biryani is a delicious South Indian dish
        </p>
    </div>

    <div class="right box">
        <p style="text-align:right;">&#8377;180</p>
    </div>

    <div style="clear:both;"></div>

</div>

<div class="content">

    <div class="left">
        <img src="https://www.madhuseverydayindian.com/wp-content/uploads/2022/11/easy-vegetable-biryani.jpg" 
        alt="Veg Biryani" style="width:80px;height:80px;">
    </div>

    <div class="left">
        <p style="text-align:center;">
        Veg Biryani is a delicious vegetarian dish
        </p>
    </div>

    <div class="right box">
        <p style="text-align:right;">&#8377;150</p>
    </div>

    <div style="clear:both;"></div>

</div>

<div class="content">

    <div class="left">
        <img src="https://images.pexels.com/photos/5410400/pexels-photo-5410400.jpeg" 
        alt="Paneer Butter Masala" style="width:80px;height:80px;">
    </div>

    <div class="left">
        <p style="text-align:center;">
        Paneer Butter Masala is a delicious side dish
        </p>
    </div>

    <div class="right box">
        <p style="text-align:right;">&#8377;170</p>
    </div>

    <div style="clear:both;"></div>

</div>

</div>

</body>
</html>
